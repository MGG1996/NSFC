name: 问题上报
description: 反馈模版无法或未正确完成的事宜
body:
  - type: checkboxes
    attributes: 
      label: 前提条件
      options:
        - label: 已将LaTeX环境更新到[TeXLive2026及以上](https://mirrors.tuna.tsinghua.edu.cn/CTAN/systems/texlive/Images/)或[MacTeX2026及以上](https://mirrors.tuna.tsinghua.edu.cn/tex-historic-archive/systems/mactex/)。
          required: true
        - label: 确定当前使用的是[最新的模版](https://github.com/MGG1996/NSFC/releases/latest)。
          required: true
        - label: 已仔细阅读了模版提供的[使用说明](https://github.com/MGG1996/NSFC/blob/main/readme.md)和[示例文档](https://github.com/MGG1996/NSFC/blob/main/tutorial.pdf)，且确定模版无法或未正确完成某些排版要求。
          required: true
        - label: 已浏览[待解决issue](https://github.com/MGG1996/NSFC/issues)和[已关闭issue](https://github.com/MGG1996/NSFC/issues?q=is%3Aissue%20state%3Aclosed)列表，且并未发现类似问题。
          required: true
  - type: input
    attributes:
      label: 你当前使用的LaTeX编译平台
      description: Windows、MacOS、Overleaf等。
    validations: 
      required: true
  - type: textarea
    attributes:
      label: 遇到了什么问题?
      description: 请不要在同一个issue下报告多个不相关的问题。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 出现问题的tex源码、报错信息、不合规的编译结果截图
      description: 根据报错信息或不符合预期的编译结果，定位对应的源码。
    validations: 
      required: true
  - type: textarea
    attributes:
      label: 附加信息
      description: 如果你还有其他需要提供的信息，可以在这里填写。
